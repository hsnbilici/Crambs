name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  analyze_test:
    name: Analyze + Unit + Widget + Golden + Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter kurulum
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'
          cache: true

      - name: Decode Firebase config (secrets → files)
        if: ${{ env.FIREBASE_OPTIONS_DART_B64 != '' }}
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
          IOS_GSI_PLIST_B64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_B64 }}
          ANDROID_GSJ_JSON_B64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set +x  # trace disable — base64 env secret'ın workflow log'una sızmasını engelle
          echo "$FIREBASE_OPTIONS_DART_B64" | base64 -d > lib/firebase_options.dart
          echo "$IOS_GSI_PLIST_B64" | base64 -d > ios/Runner/GoogleService-Info.plist
          echo "$ANDROID_GSJ_JSON_B64" | base64 -d > android/app/google-services.json

      - name: Fallback Firebase template (no secrets — fork PR veya secret unset)
        if: ${{ env.FIREBASE_OPTIONS_DART_B64 == '' }}
        env:
          FIREBASE_OPTIONS_DART_B64: ${{ secrets.FIREBASE_OPTIONS_DART_B64 }}
        # Template'i lib/firebase_options.dart'a kopyala — compile başarılı olur
        # (DefaultFirebaseOptions.currentPlatform UnimplementedError throws);
        # runtime'da FirebaseBootstrap try/catch yutar → isInitialized=false →
        # DebugLogger path → test'ler geçer.
        run: |
          cp lib/firebase_options.dart.template lib/firebase_options.dart

      - name: Bağımlılıkları yükle
        run: flutter pub get

      - name: Kod üretimi (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Statik analiz
        # docs/test-plan.md §10.1 — sıfır hata, sıfır uyarı zorunlu
        run: flutter analyze

      - name: Unit + Widget + Golden testleri
        run: flutter test --coverage

      - name: lcov kurulum
        run: sudo apt-get install -y lcov

      - name: Coverage özeti
        run: lcov --summary coverage/lcov.info

      - name: Coverage gate
        # docs/test-plan.md §5 per-modül hedefleri:
        #   lib/core/economy/    → satır %95+, dal %90+
        #   lib/core/save/       → satır %95+, dal %90+
        #   lib/core/progression → satır %90+, dal %85+
        #   lib/core/events/     → satır %85+, dal %80+
        #   lib/features/*       → satır %70+
        # Detaylı per-modül kontrol scripts/check_coverage.sh'de (ayrı PR'da yazılır)
        run: bash scripts/check_coverage.sh

      - name: Coverage artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Golden snapshot diff kontrolü
        # Golden testler --coverage çalışmasında zaten koşar.
        # Tag ile izole etmek gerekirse: flutter test --tags=golden
        run: echo "Golden testleri analyze_test adımında kapsandı"
